<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; background: #0D0B0A; color: #F9F5EF; font-family: 'Segoe UI', sans-serif; padding: 20px; }
h1 { font-size: 14px; font-weight: 400; margin-bottom: 16px; letter-spacing: 1px; }
label { display: block; color: #706862; font-size: 11px; margin-bottom: 4px; margin-top: 14px; text-transform: uppercase; letter-spacing: 1px; }
select, input {
  width: 100%; padding: 8px 10px; background: #1B1613; border: 1px solid rgba(255,255,255,0.08);
  color: #F9F5EF; border-radius: 8px; font-size: 12px; font-family: inherit; outline: none;
}
select:focus, input:focus { border-color: rgba(13,148,136,0.3); }
.help { color: #4A4440; font-size: 10px; margin-top: 4px; line-height: 1.5; }
.btn {
  display: block; width: 100%; padding: 10px; margin-top: 20px;
  background: rgba(13,148,136,0.15); border: 1px solid rgba(13,148,136,0.25);
  color: #2DD4BF; border-radius: 10px; cursor: pointer; font-size: 12px;
  text-align: center; font-family: inherit; font-weight: 500;
}
.btn:hover { background: rgba(13,148,136,0.25); }
.saved { color: #0D9488; font-size: 11px; text-align: center; margin-top: 8px; display: none; }
.back { color: #706862; font-size: 11px; cursor: pointer; margin-bottom: 12px; }
.back:hover { color: #2DD4BF; }
</style>
</head>
<body>
<div class="back" id="back">Back</div>
<h1>SETTINGS</h1>

<label>AI Provider</label>
<select id="provider">
  <option value="openai">OpenAI (GPT-4o)</option>
  <option value="anthropic">Anthropic (Claude)</option>
  <option value="ollama">Ollama (Local, free)</option>
  <option value="claude">Claude Code CLI</option>
  <option value="custom">Custom API</option>
</select>
<div class="help">OpenAI and Ollama are the easiest to set up.</div>

<label>API Key</label>
<input type="password" id="api-key" placeholder="sk-... or leave empty for Ollama/Claude CLI">
<div class="help">Stored locally on your machine. Never sent anywhere except your chosen provider.</div>

<label>Model (optional)</label>
<input type="text" id="model" placeholder="gpt-4o-mini (default depends on provider)">

<label>Custom API URL (only for Custom provider)</label>
<input type="text" id="custom-url" placeholder="https://api.together.xyz/v1/chat/completions">

<button class="btn" id="save">Save Settings</button>
<div class="saved" id="saved">Settings saved. Restart server to apply.</div>

<script src="settings.js"></script>
</body>
</html>
