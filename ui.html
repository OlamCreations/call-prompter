<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Call Prompter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"] {
  --bg: #0D0B0A;
  --surface: #1B1613;
  --surface-el: #241E1A;
  --text: #F9F5EF;
  --text-sec: #B7ACA3;
  --text-muted: #706862;
  --text-subtle: #4A4440;
  --forest: #5A8A6F;
  --forest-deep: #4A7A5F;
  --forest-bg: rgba(90,138,111,0.08);
  --teal: #2DD4BF;
  --teal-muted: #0D9488;
  --teal-bg: rgba(13,148,136,0.08);
  --amber: #D8A15A;
  --amber-deep: #9E6B24;
  --amber-bg: rgba(216,161,90,0.10);
  --danger-color: #E06060;
  --danger-deep: #993333;
  --danger-bg: rgba(224,96,96,0.08);
  --orange: #D4904A;
  --orange-bg: rgba(212,144,74,0.07);
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --noise-opacity: 0.03;
  --radius: 16px;
  --radius-sm: 12px;
  --font-serif: 'Fraunces', 'Times New Roman', serif;
  --font-sans: 'Space Grotesk', 'Segoe UI', sans-serif;
}
[data-theme="light"] {
  --bg: #F4EFE7;
  --surface: #FBF7F1;
  --surface-el: #FFFFFF;
  --text: #1A1715;
  --text-sec: #362F2B;
  --text-muted: #5C5652;
  --text-subtle: #8C8380;
  --forest: #3D5A47;
  --forest-deep: #2E4A39;
  --forest-bg: rgba(61,90,71,0.07);
  --teal: #1A7A6D;
  --teal-muted: #2B7A6F;
  --teal-bg: rgba(43,122,111,0.06);
  --amber: #9E6B24;
  --amber-deep: #7A5218;
  --amber-bg: rgba(158,107,36,0.08);
  --danger-color: #C04040;
  --danger-deep: #8A2020;
  --danger-bg: rgba(192,64,64,0.06);
  --orange: #B07030;
  --orange-bg: rgba(176,112,48,0.06);
  --glass: rgba(0,0,0,0.02);
  --glass-border: rgba(0,0,0,0.08);
  --noise-opacity: 0.02;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  height: 100vh;
  overflow: hidden;
  cursor: default;
  display: flex;
  flex-direction: column;
}

/* ─── Noise texture overlay ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: var(--noise-opacity);
  pointer-events: none;
  z-index: 999;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

#main { display: flex; flex: 1; min-height: 0; }

/* ─── Feed ──────────────────────────────────────────────────── */
#feed {
  padding: 28px 32px;
  flex: 1;
  overflow-y: auto;
}
#feed::-webkit-scrollbar { width: 5px; }
#feed::-webkit-scrollbar-track { background: transparent; }
#feed::-webkit-scrollbar-thumb { background: rgba(43,122,111,0.2); border-radius: 3px; }
#feed::-webkit-scrollbar-thumb:hover { background: rgba(43,122,111,0.4); }

/* ─── Lines ─────────────────────────────────────────────────── */
.line { margin-bottom: 14px; line-height: 1.65; opacity: 0; animation: fadein 0.4s ease-out forwards; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.line .ts { color: var(--text-subtle); font-size: 0.55em; margin-right: 12px; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }

/* ── PROSPECT: forest glass card ────────────────────────────── */
.line.transcript-prospect {
  backdrop-filter: blur(12px) saturate(1.2);
  background: var(--forest-bg);
  border: 1px solid rgba(90,138,111,0.15);
  border-left: 3px solid var(--forest);
  padding: 14px 20px;
  margin: 8px 0;
  border-radius: 4px var(--radius-sm) var(--radius-sm) 4px;
  color: var(--text);
}
.line.transcript-prospect .speaker {
  font-family: var(--font-serif);
  color: var(--forest);
  font-weight: 400;
  font-size: 0.7em;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: block;
  margin-bottom: 4px;
}

/* ── YOU: subtle, muted ─────────────────────────────────────── */
.line.transcript-jonas {
  padding: 6px 20px 6px 28px;
  margin: 3px 0;
  color: var(--text-sec);
  font-size: 0.88em;
}
.line.transcript-jonas .speaker {
  color: var(--text-muted);
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: 0.7em;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: inline;
  margin-right: 10px;
}

/* ── INSIGHT ────────────────────────────────────────────────── */
.line.insight {
  color: var(--text-sec);
  padding: 3px 20px 3px 28px;
  font-size: 0.85em;
  font-style: italic;
}

/* ── SAY: teal glass card ───────────────────────────────────── */
.line.suggestion {
  backdrop-filter: blur(12px) saturate(1.2);
  background: var(--teal-bg);
  border: 1px solid rgba(13,148,136,0.15);
  border-left: 3px solid var(--teal-muted);
  padding: 12px 20px;
  margin: 10px 0;
  border-radius: 4px var(--radius-sm) var(--radius-sm) 4px;
  color: var(--teal);
}
.line.suggestion .label {
  font-family: var(--font-serif);
  display: block;
  font-size: 0.6em;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--teal-muted);
  margin-bottom: 5px;
}

/* ── CLOSE: amber glass card, large ─────────────────────────── */
.line.closing {
  backdrop-filter: blur(16px) saturate(1.4);
  background: var(--amber-bg);
  border: 1px solid rgba(216,161,90,0.2);
  border-left: 4px solid var(--amber);
  padding: 16px 22px;
  margin: 14px 0;
  border-radius: 4px var(--radius) var(--radius) 4px;
  color: var(--amber);
  font-weight: 500;
  font-size: 1.08em;
  box-shadow: 0 4px 24px rgba(216,161,90,0.06);
}
.line.closing .label {
  font-family: var(--font-serif);
  display: block;
  font-size: 0.55em;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: var(--amber-deep);
  margin-bottom: 6px;
}

/* ── DANGER: red glass card, large ──────────────────────────── */
.line.danger {
  backdrop-filter: blur(16px) saturate(1.4);
  background: var(--danger-bg);
  border: 1px solid rgba(224,96,96,0.2);
  border-left: 4px solid var(--danger-color);
  padding: 16px 22px;
  margin: 14px 0;
  border-radius: 4px var(--radius) var(--radius) 4px;
  color: var(--danger-color);
  font-weight: 500;
  font-size: 1.08em;
  box-shadow: 0 4px 24px rgba(224,96,96,0.06);
}
.line.danger .label {
  font-family: var(--font-serif);
  display: block;
  font-size: 0.55em;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: var(--danger-deep);
  margin-bottom: 6px;
}

/* ── OBJECTION: orange glass card ───────────────────────────── */
.line.objection {
  backdrop-filter: blur(12px) saturate(1.2);
  background: var(--orange-bg);
  border: 1px solid rgba(212,144,74,0.15);
  border-left: 3px solid var(--orange);
  padding: 12px 20px;
  margin: 10px 0;
  border-radius: 4px var(--radius-sm) var(--radius-sm) 4px;
  color: var(--orange);
}
.line.objection .label {
  font-family: var(--font-serif);
  display: block;
  font-size: 0.6em;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(212,144,74,0.5);
  margin-bottom: 5px;
}

/* ── BUDGET: amber accent ───────────────────────────────────── */
.line.budget {
  backdrop-filter: blur(12px) saturate(1.2);
  background: rgba(158,107,36,0.06);
  border: 1px solid rgba(158,107,36,0.12);
  border-left: 3px solid var(--amber-deep);
  padding: 12px 20px;
  margin: 10px 0;
  border-radius: 4px var(--radius-sm) var(--radius-sm) 4px;
  color: var(--amber);
  font-weight: 500;
}
.line.budget .label {
  font-family: var(--font-serif);
  display: block;
  font-size: 0.6em;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--amber-deep);
  margin-bottom: 5px;
}

/* ── KEYWORD / SENTIMENT / SYSTEM ───────────────────────────── */
.line.keyword { color: var(--teal-muted); font-size: 0.72em; padding: 2px 28px; opacity: 0.6; letter-spacing: 0.3px; }
.line.sentiment { color: var(--text-subtle); text-transform: uppercase; letter-spacing: 4px; font-size: 0.6em; padding: 1px 28px; }
.line.system { color: var(--text-subtle); font-style: italic; font-size: 0.72em; padding: 2px 28px; opacity: 0.5; }

/* ─── Sidebar ───────────────────────────────────────────────── */
#sidebar {
  width: 320px;
  background: var(--surface);
  border-left: 1px solid var(--glass-border);
  padding: 20px;
  overflow-y: auto;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(43,122,111,0.15); border-radius: 2px; }
#sidebar .section-title {
  font-family: var(--font-serif);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 3px;
  font-size: 9px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--glass-border);
}
#sidebar .bullet {
  color: var(--text-sec);
  margin-bottom: 8px;
  line-height: 1.5;
  padding-left: 14px;
  text-indent: -10px;
  font-size: 12px;
}
#sidebar .bullet::before { content: '· '; color: var(--text-subtle); }
#sidebar .bullet.hot { color: var(--amber); }
#sidebar .bullet.hot::before { color: var(--amber); }
#sidebar .bullet.danger { color: var(--danger-color); }
#sidebar .bullet.danger::before { color: var(--danger-color); content: '! '; }
#sidebar .number { font-family: var(--font-serif); color: var(--amber); font-weight: 400; font-size: 20px; font-style: italic; }
#sidebar .number-label { color: var(--text-muted); font-size: 10px; }
#sidebar .number-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }

#sidebar-toggle {
  position: absolute;
  right: 320px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--surface);
  border: 1px solid var(--glass-border);
  color: var(--text-muted);
  padding: 12px 5px;
  cursor: pointer;
  font-size: 10px;
  z-index: 10;
  border-right: none;
  border-radius: 6px 0 0 6px;
  transition: all 0.2s;
}
#sidebar-toggle:hover { color: var(--teal); }
body.sidebar-hidden #sidebar { display: none; }
body.sidebar-hidden #sidebar-toggle { right: 0; }

/* ─── Bar ───────────────────────────────────────────────────── */
#bar {
  height: 52px;
  background: var(--surface);
  border-top: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  user-select: none;
}
#bar .left { display: flex; gap: 28px; align-items: center; }
#bar .right { display: flex; gap: 14px; align-items: center; }
#bar .sentiment-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.dot-hot { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.dot-warm { background: var(--forest); box-shadow: 0 0 8px var(--forest); }
.dot-cool { background: var(--teal-muted); }
.dot-cold { background: var(--danger-color); box-shadow: 0 0 8px var(--danger-color); }

#bar button {
  backdrop-filter: blur(8px);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text-sec);
  padding: 5px 16px;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 11px;
  border-radius: 10px;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
#bar button:hover { border-color: rgba(13,148,136,0.3); color: var(--teal); background: rgba(13,148,136,0.05); }
#bar button:active { background: rgba(13,148,136,0.1); }
#bar button.active { border-color: var(--teal-muted); color: var(--teal); }

#bar .size-controls { display: flex; align-items: center; gap: 8px; }
#bar .size-controls button { width: 30px; padding: 5px 0; text-align: center; font-weight: 600; }
#bar .size-controls .size-slider {
  -webkit-appearance: none; appearance: none;
  width: 90px; height: 3px;
  background: var(--glass-border);
  border-radius: 2px;
  outline: none; cursor: pointer;
}
#bar .size-controls .size-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 12px; height: 12px;
  background: var(--teal-muted);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.2s;
}
#bar .size-controls .size-slider::-webkit-slider-thumb:hover { background: var(--teal); }
#bar #status { font-family: var(--font-serif); font-weight: 400; letter-spacing: 2px; font-size: 11px; }
#bar #font-size-display { color: var(--text-subtle); min-width: 32px; text-align: center; font-size: 10px; }

/* ─── Responsive ────────────────────────────────────────────── */
@media (max-width: 900px) {
  #sidebar { width: 260px; padding: 14px; }
  #sidebar-toggle { right: 260px; }
  body.sidebar-hidden #sidebar-toggle { right: 0; }
}
@media (max-width: 700px) {
  #main { flex-direction: column; }
  #sidebar {
    width: 100%; max-height: 35vh; border-left: none;
    border-top: 1px solid var(--glass-border);
    flex-direction: row; flex-wrap: wrap; gap: 8px; padding: 12px;
  }
  #sidebar .section { flex: 1 1 45%; min-width: 140px; }
  #feed { height: auto; flex: 1; min-height: 0; }
  #sidebar-toggle { display: none; }
  #bar { flex-wrap: wrap; height: auto; padding: 10px 20px; gap: 8px; }
  #bar .size-controls .size-slider { width: 60px; }
}
@media (max-width: 480px) {
  #feed { padding: 14px; }
  #sidebar .section { flex: 1 1 100%; }
  #sidebar { max-height: 40vh; }
  #bar button { padding: 3px 10px; font-size: 10px; }
}
</style>
</head>
<body>
<div id="main">
  <div id="feed"></div>
  <button id="sidebar-toggle">&#9666;</button>
  <div id="sidebar">
    <div class="section" id="sec-numbers">
      <div class="section-title">Key Numbers</div>
      <div id="numbers-list"></div>
    </div>
    <div class="section" id="sec-points">
      <div class="section-title">Key Points</div>
      <div id="points-list"></div>
    </div>
    <div class="section" id="sec-objections">
      <div class="section-title">Objections</div>
      <div id="objections-list"></div>
    </div>
    <div class="section" id="sec-actions">
      <div class="section-title">Next Steps</div>
      <div id="actions-list"></div>
    </div>
  </div>
</div>
<div id="bar">
  <div class="left">
    <span id="status">DISCONNECTED</span>
    <span id="timer">00:00</span>
    <span id="sentiment-display"><span class="sentiment-dot"></span>--</span>
  </div>
  <div class="right">
    <div class="size-controls">
      <button id="btn-smaller">-</button>
      <input type="range" class="size-slider" id="size-slider" min="10" max="48" value="18">
      <button id="btn-bigger">+</button>
      <span id="font-size-display">18px</span>
    </div>
    <button id="btn-demo">DEMO</button>
    <button id="btn-theme">LIGHT</button>
    <button id="btn-scroll">SCROLL: ON</button>
    <button id="btn-pause">PAUSE</button>
    <button id="btn-clear">CLEAR</button>
  </div>
</div>

<script>
const feed = document.getElementById('feed')
const statusEl = document.getElementById('status')
const timerEl = document.getElementById('timer')
const sentimentEl = document.getElementById('sentiment-display')
const fontDisplay = document.getElementById('font-size-display')
const sizeSlider = document.getElementById('size-slider')

let fontSize = 18
let paused = false
let autoScroll = true
let startTime = null
let ws = null
let timerInterval = null

function setFontSize(size) {
  fontSize = Math.max(10, Math.min(48, size))
  feed.style.fontSize = fontSize + 'px'
  fontDisplay.textContent = fontSize + 'px'
  sizeSlider.value = fontSize
}
setFontSize(fontSize)

function addLine(text, type = 'insight') {
  if (paused) return
  const div = document.createElement('div')
  div.className = 'line ' + type
  const ts = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false })
  div.innerHTML = '<span class="ts">' + ts + '</span>' + text
  feed.appendChild(div)
  if (autoScroll) {
    requestAnimationFrame(() => {
      feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' })
    })
  }
}

// Detect manual scroll → disable auto-scroll. Scroll to bottom → re-enable.
feed.addEventListener('scroll', () => {
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60
  if (atBottom && !autoScroll) {
    autoScroll = true
    updateScrollBtn()
  } else if (!atBottom && autoScroll) {
    autoScroll = false
    updateScrollBtn()
  }
})

function updateScrollBtn() {
  const btn = document.getElementById('btn-scroll')
  if (btn) {
    btn.textContent = autoScroll ? 'SCROLL: ON' : 'SCROLL: OFF'
    btn.classList.toggle('active', !autoScroll)
  }
}

function clearAll() {
  feed.innerHTML = ''
  numbersList.innerHTML = ''
  pointsList.innerHTML = ''
  objectionsList.innerHTML = ''
  actionsList.innerHTML = ''
}

function updateSentiment(level) {
  const dots = { hot: 'dot-hot', warm: 'dot-warm', cool: 'dot-cool', cold: 'dot-cold' }
  sentimentEl.innerHTML = '<span class="sentiment-dot ' + (dots[level] || '') + '"></span>' + level.toUpperCase()
}

function updateTimer() {
  if (!startTime) return
  const elapsed = Math.floor((Date.now() - startTime) / 1000)
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0')
  const s = String(elapsed % 60).padStart(2, '0')
  timerEl.textContent = m + ':' + s
}

function connect() {
  const port = new URLSearchParams(window.location.search).get('port') || '4242'
  try { ws = new WebSocket('ws://127.0.0.1:' + port) } catch {
    addLine('WebSocket blocked (file://). Double-click to start demo.', 'system')
    return
  }
  ws.onopen = () => {
    statusEl.textContent = 'LIVE'
    statusEl.style.color = 'var(--teal)'
    startTime = Date.now()
    timerInterval = setInterval(updateTimer, 1000)
    addLine('Connected to Call Prompter', 'system')
  }
  ws.onmessage = (e) => handleMessage(e.data)
  ws.onclose = () => {
    statusEl.textContent = 'DISCONNECTED'
    statusEl.style.color = 'var(--danger-color)'
    clearInterval(timerInterval)
    addLine('Disconnected. Reconnecting in 3s...', 'system')
    setTimeout(connect, 3000)
  }
  ws.onerror = () => { try { ws.close() } catch {} }
}

function handleMessage(raw) {
  try {
    const msg = JSON.parse(raw)
    switch (msg.type) {
      case 'transcript': {
        const speaker = (msg.speaker || '?').toLowerCase()
        const isMe = speaker.includes('jonas') || speaker.includes('you') || speaker.includes('moi')
        const lineClass = isMe ? 'transcript-jonas' : 'transcript-prospect'
        const speakerClass = isMe ? 'jonas' : 'prospect'
        addLine('<span class="speaker ' + speakerClass + '">' + (msg.speaker || '?') + '</span> ' + msg.text, lineClass)
        break
      }
      case 'insight':
        addLine(msg.text, 'insight')
        addSidebarBullet(pointsList, msg.text)
        break
      case 'suggestion':
        addLine('<span class="label">Say</span>' + msg.text, 'suggestion')
        addSidebarBullet(actionsList, msg.text)
        break
      case 'closing':
        addLine('<span class="label">Close Now</span>' + msg.text, 'closing')
        addSidebarBullet(actionsList, msg.text, 'hot')
        break
      case 'danger':
        addLine('<span class="label">Warning</span>' + msg.text, 'danger')
        addSidebarBullet(pointsList, msg.text, 'danger')
        break
      case 'objection':
        addLine('<span class="label">Objection</span>' + msg.text, 'objection')
        if (msg.response) addLine('<span class="label">Say</span>' + msg.response, 'suggestion')
        addSidebarBullet(objectionsList, msg.text + (msg.response ? ' — ' + msg.response : ''))
        break
      case 'sentiment':
        updateSentiment(msg.level)
        break
      case 'keyword':
        addLine('KEYWORDS: ' + msg.words.join(', '), 'keyword')
        msg.words.forEach(w => {
          const num = w.match(/([\d\s,.]+[€$%hj]|[\d]+[kK])/g)
          if (num) num.forEach(n => addNumber(n.trim(), w))
        })
        break
      case 'budget':
        addLine('<span class="label">Budget Signal</span>' + msg.text, 'budget')
        const nums = msg.text.match(/[\d\s,.]+[€$k]/g)
        if (nums) nums.forEach(n => addNumber(n.trim(), 'budget'))
        addSidebarBullet(pointsList, msg.text, 'hot')
        break
      case 'system':
        addLine(msg.text, 'system')
        break
      default:
        addLine(msg.text || JSON.stringify(msg), 'insight')
    }
  } catch { addLine(raw, 'insight') }
}

// ─── Sidebar ─────────────────────────────────────────────────
const numbersList = document.getElementById('numbers-list')
const pointsList = document.getElementById('points-list')
const objectionsList = document.getElementById('objections-list')
const actionsList = document.getElementById('actions-list')

function addSidebarBullet(listEl, text, cls = '') {
  const div = document.createElement('div')
  div.className = 'bullet' + (cls ? ' ' + cls : '')
  div.textContent = text
  listEl.appendChild(div)
  listEl.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
}

function addNumber(value, label) {
  const row = document.createElement('div')
  row.className = 'number-row'
  row.innerHTML = '<span class="number">' + value + '</span><span class="number-label">' + label + '</span>'
  numbersList.appendChild(row)
}

document.getElementById('sidebar-toggle').onclick = () => {
  document.body.classList.toggle('sidebar-hidden')
  document.getElementById('sidebar-toggle').innerHTML =
    document.body.classList.contains('sidebar-hidden') ? '&#9656;' : '&#9666;'
}

// ─── Controls ────────────────────────────────────────────────
document.getElementById('btn-bigger').onclick = () => setFontSize(fontSize + 2)
document.getElementById('btn-smaller').onclick = () => setFontSize(fontSize - 2)
sizeSlider.oninput = () => setFontSize(Number(sizeSlider.value))

document.getElementById('btn-pause').onclick = () => {
  paused = !paused
  const btn = document.getElementById('btn-pause')
  btn.textContent = paused ? 'RESUME' : 'PAUSE'
  btn.classList.toggle('active', paused)
}
document.getElementById('btn-clear').onclick = () => clearAll()

document.getElementById('btn-scroll').onclick = () => {
  autoScroll = !autoScroll
  updateScrollBtn()
  if (autoScroll) feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' })
}

// Theme toggle
let currentTheme = localStorage.getItem('cp-theme') || 'dark'
document.documentElement.setAttribute('data-theme', currentTheme)
document.getElementById('btn-theme').textContent = currentTheme === 'dark' ? 'LIGHT' : 'DARK'

document.getElementById('btn-theme').onclick = () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark'
  document.documentElement.setAttribute('data-theme', currentTheme)
  document.getElementById('btn-theme').textContent = currentTheme === 'dark' ? 'LIGHT' : 'DARK'
  localStorage.setItem('cp-theme', currentTheme)
}

// Demo button
document.getElementById('btn-demo').onclick = () => toggleDemo()

document.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') setFontSize(fontSize + 2)
  if (e.key === '-') setFontSize(fontSize - 2)
  if (e.key === ' ') { e.preventDefault(); document.getElementById('btn-pause').click() }
  if (e.key === 'c' && !e.ctrlKey) clearAll()
  if (e.key === 's') document.getElementById('btn-scroll').click()
  if (e.key === 'd') toggleDemo()
  if (e.key === 't') document.getElementById('btn-theme').click()
  if (e.key === 'f') document.documentElement.requestFullscreen?.()
  if (e.key === 'Escape') document.exitFullscreen?.()
})

feed.addEventListener('wheel', (e) => {
  if (e.ctrlKey) { e.preventDefault(); setFontSize(fontSize + (e.deltaY < 0 ? 2 : -2)) }
}, { passive: false })

// ─── Auto-connect ────────────────────────────────────────────
connect()

let demoIdx = 0
function toggleDemo() {
  demoMode = !demoMode
  const btn = document.getElementById('btn-demo')
  if (demoMode) {
    demoIdx = 0
    startTime = Date.now()
    statusEl.textContent = 'DEMO'
    statusEl.style.color = 'var(--amber)'
    clearInterval(timerInterval)
    timerInterval = setInterval(updateTimer, 1000)
    addLine('Demo mode — simulated sales call', 'system')
    btn.textContent = 'STOP DEMO'
    btn.classList.add('active')
    demoInterval = setInterval(() => {
      if (demoIdx >= demos.length) demoIdx = 0
      handleMessage(JSON.stringify(demos[demoIdx++]))
    }, 2500)
  } else {
    clearInterval(demoInterval)
    clearInterval(timerInterval)
    demoInterval = null
    // Full reset — clear feed + sidebar + status
    clearAll()
    statusEl.textContent = 'DISCONNECTED'
    statusEl.style.color = 'var(--text-subtle)'
    timerEl.textContent = '00:00'
    sentimentEl.innerHTML = '<span class="sentiment-dot"></span>--'
    startTime = null
    btn.textContent = 'DEMO'
    btn.classList.remove('active')
  }
}

document.addEventListener('dblclick', (e) => {
  if (e.target.closest('#bar')) return
  toggleDemo()
})
